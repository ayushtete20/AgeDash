<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgeDash | Control Panel Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#FF9B51",
                        "primary-dark": "#e5823c",
                        background: "#F4F5F7",
                        surface: "#FFFFFF",
                        slate: {
                            850: "#1e293b",
                            900: "#0f172a"
                        }
                    },
                    fontFamily: {
                        sans: ["'Plus Jakarta Sans'", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <style>
        body {
            background-color: #F4F5F7;
            color: #1E293B;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
        }
    </style>
</head>

<body class="h-full overflow-hidden bg-background">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        // ── Auth Check ────────────────────────────────────────────────────────
        function checkUserAuth() {
            if (!sessionStorage.getItem('agedash_token')) {
                window.location.href = '/login';
            }
        }
        checkUserAuth();
        window.addEventListener('pageshow', function(e) { if (e.persisted) checkUserAuth(); });
        
        const _agedashToken = sessionStorage.getItem('agedash_token');
        const _agedashEmail = sessionStorage.getItem('agedash_email') || 'user@agedash.io';

        // MariaDB/Auth server runs on port 3001
        const DB_API = '';

        const { useState, useEffect } = React;

        const Ico = ({ name, className = "", fill = false }) => (
            <span className={`material-symbols-outlined ${className}`} style={{ fontVariationSettings: `'FILL' ${fill ? 1 : 0}` }}>
                {name}
            </span>
        );

        function App() {
            const [activeSidebarTab, setActiveSidebarTab] = useState('LinkedIn Tools'); // Dashboard, LinkedIn Tools, History, Profile
            const [activeMainTab, setActiveMainTab] = useState('jobs'); // jobs, company
            const [fileName, setFileName] = useState('');
            const [fileObj, setFileObj] = useState(null);
            const [customPrompt, setCustomPrompt] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            const [searchQuery, setSearchQuery] = useState('');
            const [searchLimit, setSearchLimit] = useState(10);
            const [scrapedCount, setScrapedCount] = useState(0);
            const [isSearching, setIsSearching] = useState(false);
            const [executionLog, setExecutionLog] = useState([]);

            // History state
            const [historyData, setHistoryData] = useState([]);
            const [isHistoryLoading, setIsHistoryLoading] = useState(false);

            // Profile state
            const [profileData, setProfileData] = useState(null);
            const [profileName, setProfileName] = useState('');
            const [profileSaving, setProfileSaving] = useState(false);
            const [profileMsg, setProfileMsg] = useState(null);
            const [curPwd, setCurPwd] = useState('');
            const [newPwd, setNewPwd] = useState('');
            const [confirmPwd, setConfirmPwd] = useState('');
            const [pwdSaving, setPwdSaving] = useState(false);
            const [pwdMsg, setPwdMsg] = useState(null);

            // Fetch profile on mount
            useEffect(() => {
                fetch(`${DB_API}/api/profile?t=${Date.now()}`, {
                    headers: { 'Authorization': `Bearer ${_agedashToken}` }
                })
                .then(r => {
                    if (r.status === 401 || r.status === 403) {
                        sessionStorage.clear();
                        window.location.href = '/login';
                        throw new Error('Invalid token');
                    }
                    return r.json();
                })
                .then(d => {
                    if (d.email) {
                        setProfileData(d);
                        setProfileName(d.profile_name || '');
                    }
                })
                .catch(e => console.error('Error fetching profile:', e));
            }, []);

            // Fetch history when tab changes to History
            useEffect(() => {
                if (activeSidebarTab === 'History') {
                    setIsHistoryLoading(true);
                    fetch(`${DB_API}/api/profile/queries`, {
                        headers: { 'Authorization': `Bearer ${_agedashToken}` }
                    })
                    .then(r => r.json())
                    .then(d => {
                        setHistoryData(Array.isArray(d) ? d : []);
                    })
                    .catch(e => console.error('Error fetching history:', e))
                    .finally(() => setIsHistoryLoading(false));
                }
            }, [activeSidebarTab]);

            const sidebarItems = [
                { name: 'Dashboard', icon: 'dashboard' },
                { name: 'LinkedIn Tools', icon: 'travel_explore' },
                { name: 'History', icon: 'history' },
                { name: 'Profile', icon: 'person' }
            ];

            const saveProfileName = async () => {
                setProfileSaving(true); setProfileMsg(null);
                try {
                    const r = await fetch(`${DB_API}/api/profile/name`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_agedashToken}` },
                        body: JSON.stringify({ profile_name: profileName })
                    });
                    const d = await r.json();
                    if (r.ok) { setProfileMsg({ type: 'ok', text: 'Display name saved!' }); setProfileData(prev => ({ ...prev, profile_name: profileName })); }
                    else setProfileMsg({ type: 'err', text: d.message || 'Failed.' });
                } catch { setProfileMsg({ type: 'err', text: 'Network error.' }); }
                finally { setProfileSaving(false); setTimeout(() => setProfileMsg(null), 3000); }
            };

            const changePassword = async () => {
                setPwdMsg(null);
                if (!curPwd || !newPwd) return setPwdMsg({ type: 'err', text: 'Fill in all fields.' });
                if (newPwd.length < 4) return setPwdMsg({ type: 'err', text: 'New password must be at least 4 characters.' });
                if (newPwd !== confirmPwd) return setPwdMsg({ type: 'err', text: 'New passwords do not match.' });
                setPwdSaving(true);
                try {
                    const r = await fetch(`${DB_API}/api/profile/password`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_agedashToken}` },
                        body: JSON.stringify({ current_password: curPwd, new_password: newPwd })
                    });
                    const d = await r.json();
                    if (r.ok) { setPwdMsg({ type: 'ok', text: 'Password changed successfully!' }); setCurPwd(''); setNewPwd(''); setConfirmPwd(''); }
                    else setPwdMsg({ type: 'err', text: d.message || 'Failed.' });
                } catch { setPwdMsg({ type: 'err', text: 'Network error.' }); }
                finally { setPwdSaving(false); setTimeout(() => setPwdMsg(null), 4000); }
            };



            const handleFileChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    setFileName(e.target.files[0].name);
                    setFileObj(e.target.files[0]);
                }
            };

            const handleRunSearch = async () => {
                if (!searchQuery) {
                    alert('Please enter a profile search query.');
                    return;
                }
                setIsSearching(true);
                const currentTime = new Date().toLocaleTimeString();

                setExecutionLog(prev => [
                    `[${currentTime}] Initializing LinkedIn Profile Search for query: "${searchQuery}" (Limit: ${searchLimit})...`,
                    ...prev
                ]);

                // ── Step 1: Fire n8n webhook ─────────────────────────────
                try {
                    const webhookFormData = new FormData();
                    webhookFormData.append('query', searchQuery);
                    webhookFormData.append('limit', searchLimit);
                    webhookFormData.append('type', activeMainTab === 'company' ? 'Company Search' : 'Profile Search');
                    if (customPrompt) {
                        webhookFormData.append('prompt', customPrompt);
                    }
                    webhookFormData.append('timestamp', new Date().toISOString());
                    if (fileObj) {
                        webhookFormData.append('file', fileObj);
                    }
                    if (profileData && profileData.google_sheet_url) {
                        webhookFormData.append('google_sheet_url', profileData.google_sheet_url);
                    }

                    const webhookResponse = await fetch('https://n8n.srv1693239.hstgr.cloud/webhook/9d215848-6ff4-4568-96f9-725f69d1d095', {
                        method: 'POST',
                        body: webhookFormData
                    });

                    const logTime = new Date().toLocaleTimeString();
                    if (webhookResponse.ok) {
                        setScrapedCount(prev => prev + 1);
                        setExecutionLog(prev => [
                            `[${logTime}] ✅ Webhook: Dispatched search for "${searchQuery}" (Limit: ${searchLimit}). Status: 200 OK.`,
                            ...prev
                        ]);
                    } else {
                        setExecutionLog(prev => [
                            `[${logTime}] ⚠️  Webhook: Query dispatched but server returned status ${webhookResponse.status}.`,
                            ...prev
                        ]);
                    }
                } catch (err) {
                    const logTime = new Date().toLocaleTimeString();
                    console.error('Error triggering webhook:', err);
                    setExecutionLog(prev => [
                        `[${logTime}] ❌ Connection Failed: Network error triggering webhook.`,
                        ...prev
                    ]);
                }

                // ── Step 2: Track query in MariaDB (FormData upload) ──────
                try {
                    const formData = new FormData();
                    formData.append('search_query', searchQuery);
                    formData.append('details', `Limit: ${searchLimit}${fileName ? ' | File: ' + fileName : ''}${customPrompt ? ' | Prompt: ' + customPrompt : ''}`);
                    if (fileObj) {
                        formData.append('pdf', fileObj);
                    }

                    const trackResponse = await fetch(`${DB_API}/api/queries/track`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${_agedashToken}`
                        },
                        body: formData
                    });
                    const trackTime = new Date().toLocaleTimeString();
                    if (trackResponse.ok) {
                        const td = await trackResponse.json();
                        setExecutionLog(prev => [
                            `[${trackTime}] 🗄️  DB: Query and PDF saved to database (ID: ${td.id}).`,
                            ...prev
                        ]);
                    } else {
                        setExecutionLog(prev => [
                            `[${trackTime}] ⚠️  DB: Could not save query — server returned ${trackResponse.status}.`,
                            ...prev
                        ]);
                    }
                } catch (dbErr) {
                    const trackTime = new Date().toLocaleTimeString();
                    setExecutionLog(prev => [
                        `[${trackTime}] ⚠️  DB: No connection to local backend. Query not persisted.`,
                        ...prev
                    ]);
                } finally {
                    setIsSearching(false);
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-[#F8F9FA]">
                    {/* Mobile Sidebar Backdrop */}
                    {isSidebarOpen && (
                        <div 
                            className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 lg:hidden"
                            onClick={() => setIsSidebarOpen(false)}
                        />
                    )}

                    {/* SIDEBAR NAVIGATION - Dark Theme */}
                    <aside className={`fixed inset-y-0 left-0 z-50 flex flex-col w-64 bg-slate-900 border-r border-slate-800 transition-transform duration-300 transform lg:static lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        {/* Brand Logo Header */}
                        <div className="flex items-center gap-3 px-6 py-5 border-b border-slate-800 flex-shrink-0">
                            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-[#FF9B51] to-orange-600 flex items-center justify-center shadow-lg shadow-orange-500/20">
                                <span className="text-white font-extrabold text-base">A</span>
                            </div>
                            <div>
                                <p className="font-extrabold text-white text-sm tracking-tight">AgeDash</p>
                                <p className="text-[10px] font-medium text-slate-400">Host Management Panel</p>
                            </div>
                        </div>

                        {/* Navigation Items */}
                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            {sidebarItems.map((item) => {
                                const isActive = activeSidebarTab === item.name;
                                return (
                                    <button
                                        key={item.name}
                                        onClick={() => {
                                            setActiveSidebarTab(item.name);
                                            setIsSidebarOpen(false);
                                        }}
                                        className={`w-full flex items-center gap-3.5 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 ${
                                            isActive
                                                ? 'bg-orange-500/10 text-[#FF9B51] border-l-4 border-[#FF9B51] pl-3'
                                                : 'text-slate-400 hover:bg-slate-800 hover:text-white border-l-4 border-transparent'
                                        }`}
                                    >
                                        <Ico name={item.icon} className={isActive ? 'text-[#FF9B51]' : 'text-slate-400'} />
                                        {item.name}
                                    </button>
                                );
                            })}
                        </nav>

                        {/* Google Sheet Link */}
                        {profileData?.google_sheet_url && (
                            <div className="px-4 pb-4 flex-shrink-0">
                                <a 
                                    href={profileData.google_sheet_url} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-[#FF9B51]/10 border border-[#FF9B51]/20 text-[#FF9B51] hover:bg-[#FF9B51]/20 font-bold text-xs transition shadow-sm"
                                >
                                    <Ico name="table_view" className="text-sm" />
                                    My Results Sheet
                                </a>
                            </div>
                        )}

                        {/* Sidebar Footer Profile */}
                        <div className="p-4 border-t border-slate-800 flex-shrink-0 bg-slate-950/30">
                            <div className="flex items-center gap-3 p-2 rounded-xl bg-slate-800 border border-slate-700/50 shadow-sm">
                                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-[#FF9B51] to-orange-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0 shadow-sm">
                                    {_agedashEmail.charAt(0).toUpperCase()}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-semibold text-white truncate">Signed In</p>
                                    <p className="text-[10px] text-slate-400 truncate" title={_agedashEmail}>{_agedashEmail}</p>
                                </div>
                                <button onClick={() => { sessionStorage.clear(); window.location.href = '/login'; }} title="Sign out" className="text-slate-400 hover:text-[#FF9B51] transition flex-shrink-0">
                                    <Ico name="logout" className="text-lg" />
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT WRAPPER */}
                    <div className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
                        
                        {/* TOP HEADER BAR */}
                        <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex items-center justify-between gap-4 flex-shrink-0 shadow-sm z-30">
                            <div className="flex items-center gap-3 flex-1">
                                <button 
                                    className="lg:hidden text-slate-500 hover:text-[#FF9B51] transition"
                                    onClick={() => setIsSidebarOpen(true)}
                                >
                                    <Ico name="menu" className="text-2xl" />
                                </button>
                                <div className="relative max-w-md w-full hidden md:block">
                                    <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                        <Ico name="search" className="text-slate-400 text-lg" />
                                    </span>
                                    <input 
                                        type="text" 
                                        placeholder="Search automation parameters, nodes, services..."
                                        className="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-1 focus:ring-[#FF9B51] outline-none transition bg-slate-50"
                                    />
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <button className="relative p-2 rounded-xl text-slate-400 hover:text-[#FF9B51] hover:bg-orange-50 transition">
                                    <Ico name="notifications" className="text-xl" />
                                    <span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-[#FF9B51] border-2 border-white" />
                                </button>
                                <div className="h-6 w-px bg-slate-200" />
                                <div className="flex items-center gap-3">
                                    <img 
                                        src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=100" 
                                        alt="Avatar" 
                                        className="w-8 h-8 rounded-full object-cover border-2 border-white shadow-sm ring-1 ring-slate-200"
                                    />
                                    <div className="hidden sm:block text-left">
                                        <p className="text-xs font-semibold text-slate-800">{profileName || profileData?.email || _agedashEmail}</p>
                                        <p className="text-[10px] text-slate-400">User</p>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* INTERACTIVE WORKSPACE AREA */}
                        <main className="flex-1 overflow-y-auto px-6 py-8 relative">
                            {/* Decorative background blur */}
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-64 bg-orange-400/5 blur-[120px] rounded-full pointer-events-none" />
                            
                            <div className="max-w-4xl mx-auto space-y-8 relative z-10">

                              {/* ─── Dashboard Tab (Agent Cards) ─── */}
                              {activeSidebarTab === 'Dashboard' && (
                                <div className="space-y-6">
                                    <div>
                                        <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight">Welcome to AgeDash</h1>
                                        <p className="text-sm text-slate-500 mt-1 font-medium">Select an automation agent to get started.</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                        {/* Profile Search Agent Card */}
                                        <div 
                                            onClick={() => { setActiveSidebarTab('LinkedIn Tools'); setActiveMainTab('jobs'); }}
                                            className="bg-white rounded-3xl p-8 border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_8px_40px_rgb(255,155,81,0.15)] hover:border-orange-200 cursor-pointer transition-all duration-300 group relative overflow-hidden"
                                        >
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-orange-100 rounded-bl-full -z-0 opacity-50 group-hover:scale-110 transition-transform duration-500"></div>
                                            <div className="relative z-10">
                                                <div className="w-14 h-14 rounded-2xl bg-orange-50 text-[#FF9B51] flex items-center justify-center mb-6">
                                                    <Ico name="person_search" className="text-3xl" />
                                                </div>
                                                <h3 className="text-xl font-bold text-slate-800 mb-2">LinkedIn Profile Search</h3>
                                                <p className="text-sm text-slate-500 mb-6 line-clamp-2">Automate profile discovery and resume matching to find the perfect candidates instantly.</p>
                                                <div className="flex items-center text-[#FF9B51] font-bold text-sm group-hover:translate-x-1 transition-transform">
                                                    Launch Agent <Ico name="arrow_forward" className="ml-1 text-sm" />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Company Search Agent Card */}
                                        <div 
                                            onClick={() => { setActiveSidebarTab('LinkedIn Tools'); setActiveMainTab('company'); }}
                                            className="bg-white rounded-3xl p-8 border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_8px_40px_rgb(59,130,246,0.15)] hover:border-blue-200 cursor-pointer transition-all duration-300 group relative overflow-hidden"
                                        >
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -z-0 opacity-50 group-hover:scale-110 transition-transform duration-500"></div>
                                            <div className="relative z-10">
                                                <div className="w-14 h-14 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center mb-6">
                                                    <Ico name="domain" className="text-3xl" />
                                                </div>
                                                <h3 className="text-xl font-bold text-slate-800 mb-2">LinkedIn Company Search</h3>
                                                <p className="text-sm text-slate-500 mb-6 line-clamp-2">Scrape company insights, jobs, and details to generate targeted leads effortlessly.</p>
                                                <div className="flex items-center text-blue-500 font-bold text-sm group-hover:translate-x-1 transition-transform">
                                                    Launch Agent <Ico name="arrow_forward" className="ml-1 text-sm" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                              )}

                              {/* ─── LinkedIn Tools Tab ─── */}
                              {activeSidebarTab === 'LinkedIn Tools' && (
                                <>
                                {/* Welcome Title Section */}
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div>
                                        <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight">LinkedIn Automation Hub</h1>
                                        <p className="text-sm text-slate-500 mt-1 font-medium">Configure search parameters, track jobs, and sync results instantly.</p>
                                    </div>
                                    <div className="flex items-center gap-2 bg-orange-50 text-[#FF9B51] text-xs font-bold px-4 py-2 rounded-full border border-orange-100 shadow-sm">
                                        <span className="w-2 h-2 rounded-full bg-[#FF9B51] animate-pulse" />
                                        Running Pipeline Node
                                    </div>
                                </div>

                                {/* MAIN DASHBOARD CARD */}
                                <div className="bg-white rounded-3xl p-4 md:p-5 flex flex-col justify-between h-full shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 relative overflow-hidden">
                                    {/* Subtle orange accent bar at the top */}
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#FF9B51] to-orange-400"></div>
                                    
                                    {/* Tab Headers */}
                                    <div className="flex items-center justify-between border-b border-slate-100 pb-5 mb-8 flex-wrap gap-4 pt-2">
                                        <div className="flex gap-2 bg-slate-50 p-1.5 rounded-xl border border-slate-100">
                                            <button
                                                onClick={() => setActiveMainTab('jobs')}
                                                className={`px-5 py-2.5 rounded-lg text-xs font-bold tracking-wide transition-all ${
                                                    activeMainTab === 'jobs'
                                                        ? 'bg-white text-slate-900 shadow-sm border border-slate-200'
                                                        : 'text-slate-500 hover:text-slate-900'
                                                }`}
                                            >
                                                LinkedIn Profile Search
                                            </button>
                                            <button
                                                onClick={() => setActiveMainTab('company')}
                                                className={`px-5 py-2.5 rounded-lg text-xs font-bold tracking-wide transition-all ${
                                                    activeMainTab === 'company'
                                                        ? 'bg-white text-slate-900 shadow-sm border border-slate-200'
                                                        : 'text-slate-500 hover:text-slate-900'
                                                }`}
                                            >
                                                LinkedIn Company Search
                                            </button>
                                        </div>

                                        {/* Top-Right Google Sheets Integration Link */}
                                        <div className="group relative flex items-center gap-2 bg-emerald-50 hover:bg-emerald-100 transition-colors border border-emerald-200/60 px-4 py-2 rounded-xl cursor-pointer">
                                            <svg className="w-4 h-4 text-emerald-600" viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-2h2v2zm0-4H7v-2h2v2zm0-4H7V7h2v2zm4 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2zm4 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z" />
                                            </svg>
                                            <span className="text-[11px] font-bold text-emerald-800">Connected to Sheets</span>
                                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping absolute -top-1 -right-1" />
                                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 absolute -top-1 -right-1" />
                                            
                                            <div className="absolute right-0 top-full mt-2 w-64 p-3 bg-slate-900 text-white text-[11px] font-medium leading-normal rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 pointer-events-none">
                                                Add your target Google Sheet URL directly in the settings panel below.
                                            </div>
                                        </div>
                                    </div>

                                    {/* TAB 1: LinkedIn Profile Search */}
                                    {activeMainTab === 'jobs' && (
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                {/* Resume Upload Area & Message Box */}
                                                <div className="flex flex-col gap-4">
                                                    <div>
                                                        <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-3">Upload Match Criteria (Optional)</label>
                                                        <div className="relative border-2 border-dashed border-orange-200 hover:border-[#FF9B51] rounded-2xl p-6 bg-orange-50/50 hover:bg-orange-50 text-center cursor-pointer transition-all duration-300 flex flex-col items-center justify-center h-40">
                                                            <input 
                                                                type="file" 
                                                                onChange={handleFileChange}
                                                                className="absolute inset-0 opacity-0 w-full h-full cursor-pointer" 
                                                            />
                                                            <div className="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center mb-3">
                                                                <Ico name="cloud_upload" className="text-xl text-[#FF9B51]" />
                                                            </div>
                                                            <p className="text-sm font-bold text-slate-700">
                                                                {fileName ? fileName : "Drag & drop PDF / Word here"}
                                                            </p>
                                                            <p className="text-[11px] font-medium text-slate-400 mt-1">Accepts docs up to 10MB</p>
                                                        </div>
                                                    </div>
                                                    
                                                    {/* Custom Instructions Message Box */}
                                                    <div>
                                                        <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2">Additional Instructions (Optional)</label>
                                                        <textarea 
                                                            placeholder="Add specific instructions for this query..."
                                                            value={customPrompt}
                                                            onChange={(e) => setCustomPrompt(e.target.value)}
                                                            className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-2 focus:ring-[#FF9B51]/20 outline-none transition bg-slate-50 min-h-[80px] resize-y"
                                                        />
                                                    </div>
                                                </div>

                                                {/* Profile Search Parameters */}
                                                <div className="flex flex-col justify-between space-y-4">
                                                    <div className="grid grid-cols-3 gap-4">
                                                        <div className="col-span-2">
                                                            <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-3">Search Profile Query</label>
                                                            <div className="relative">
                                                                <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                                                    <Ico name="person_search" className="text-slate-400 text-base" />
                                                                </span>
                                                                <input 
                                                                    type="text" 
                                                                    placeholder="e.g. React Developer"
                                                                    value={searchQuery}
                                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                                    className="w-full pl-10 pr-4 py-3.5 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-2 focus:ring-[#FF9B51]/20 outline-none transition bg-slate-50"
                                                                />
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-3">Limit</label>
                                                            <input 
                                                                type="number" 
                                                                min="1"
                                                                max="200"
                                                                value={searchLimit}
                                                                onChange={(e) => setSearchLimit(parseInt(e.target.value) || 10)}
                                                                className="w-full px-4 py-3.5 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-2 focus:ring-[#FF9B51]/20 outline-none transition bg-slate-50"
                                                            />
                                                        </div>
                                                    </div>

                                                    {/* Action button */}
                                                    <button 
                                                        onClick={handleRunSearch}
                                                        disabled={isSearching}
                                                        className="w-full bg-gradient-to-r from-[#FF9B51] to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white font-bold py-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-orange-500/25 hover:shadow-orange-500/40 transform hover:-translate-y-0.5 disabled:opacity-50 disabled:hover:translate-y-0"
                                                    >
                                                        <Ico name={isSearching ? 'autorenew' : 'play_arrow'} className={`text-xl ${isSearching ? 'animate-spin' : ''}`} fill={!isSearching} />
                                                        {isSearching ? 'Searching...' : 'Run LinkedIn Profile Search'}
                                                    </button>
                                                </div>
                                            </div>

                                            {/* Live Response Execution Log */}
                                            {executionLog.length > 0 && (
                                                <div className="bg-slate-900 border border-slate-800 text-slate-300 font-mono text-[11px] p-5 rounded-2xl space-y-2 max-h-40 overflow-y-auto shadow-inner">
                                                    <p className="text-white font-bold pb-2 mb-2 flex items-center gap-2 sticky top-0 bg-slate-900/90 backdrop-blur-sm z-10">
                                                        <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse inline-block" />
                                                        Webhook Execution Log
                                                    </p>
                                                    {executionLog.map((log, index) => (
                                                        <div key={index} className="truncate select-all leading-relaxed opacity-90">{log}</div>
                                                    ))}
                                                </div>
                                            )}

                                            {/* Counter Metric Container */}
                                            <div className="bg-gradient-to-br from-slate-50 to-white border border-slate-100 rounded-2xl p-5 flex items-center justify-between shadow-sm">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 rounded-xl bg-orange-50 flex items-center justify-center text-[#FF9B51] shadow-inner">
                                                        <Ico name="analytics" className="text-2xl" />
                                                    </div>
                                                    <div>
                                                        <p className="text-sm font-extrabold text-slate-800">Scraped Profiles Metric</p>
                                                        <p className="text-[11px] font-medium text-slate-500">Total profile extractions matched</p>
                                                    </div>
                                                </div>
                                                <div className="text-lg font-bold text-slate-800 px-5 py-2 bg-white border border-slate-100 rounded-xl shadow-sm">
                                                    Profiles Scraped: <span className="text-[#FF9B51] font-extrabold ml-1">[ {scrapedCount} ]</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB 2: LinkedIn Company Profile */}
                                    {activeMainTab === 'company' && (
                                        <div className="space-y-6 py-8">
                                            <div>
                                                <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-3">Search Company Profile</label>
                                                <div className="relative">
                                                    <span className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                        <Ico name="corporate_fare" className="text-slate-400 text-xl" />
                                                    </span>
                                                    <input 
                                                        type="text" 
                                                        placeholder="Enter target LinkedIn Company URL or Name"
                                                        className="w-full pl-12 pr-4 py-4 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-2 focus:ring-[#FF9B51]/20 outline-none transition bg-slate-50"
                                                    />
                                                </div>
                                            </div>

                                            <button className="w-full bg-gradient-to-r from-[#FF9B51] to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white font-bold py-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-orange-500/25 hover:shadow-orange-500/40 transform hover:-translate-y-0.5">
                                                <Ico name="dns" className="text-xl" />
                                                Start Company Scrape
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {/* Additional Management Information Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 pb-12">
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-[0_4px_20px_rgb(0,0,0,0.02)] hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between group">
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center mb-1">
                                                <Ico name="sync" className="text-sm" />
                                            </div>
                                            <span className="bg-emerald-100 text-emerald-800 text-[10px] font-bold px-3 py-1 rounded-full">OK</span>
                                        </div>
                                        <h3 className="text-sm font-bold text-slate-800 mb-1">Sync Target</h3>
                                        <p className="text-[11px] font-medium text-slate-500 mb-5 leading-relaxed">Exporting real-time scraped parameters to Google Sheet destination.</p>
                                        <button className="w-full py-2.5 bg-slate-50 group-hover:bg-emerald-50 group-hover:text-emerald-700 group-hover:border-emerald-200 text-slate-700 text-xs font-bold rounded-xl border border-slate-200 transition-colors">
                                            Configure Sheet Link
                                        </button>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-[0_4px_20px_rgb(0,0,0,0.02)] hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between group">
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="w-8 h-8 rounded-lg bg-orange-50 text-[#FF9B51] flex items-center justify-center mb-1">
                                                <Ico name="webhook" className="text-sm" />
                                            </div>
                                            <span className="bg-orange-100 text-[#FF9B51] text-[10px] font-bold px-3 py-1 rounded-full">ACTIVE</span>
                                        </div>
                                        <h3 className="text-sm font-bold text-slate-800 mb-1">Webhook Node</h3>
                                        <p className="text-[11px] font-medium text-slate-500 mb-5 leading-relaxed">Listening for incoming data streams from local node scraper server.</p>
                                        <button className="w-full py-2.5 bg-slate-50 group-hover:bg-orange-50 group-hover:text-[#FF9B51] group-hover:border-orange-200 text-slate-700 text-xs font-bold rounded-xl border border-slate-200 transition-colors">
                                            View Logs
                                        </button>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-[0_4px_20px_rgb(0,0,0,0.02)] hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between group">
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center mb-1">
                                                <Ico name="api" className="text-sm" />
                                            </div>
                                            <span className="bg-blue-100 text-blue-800 text-[10px] font-bold px-3 py-1 rounded-full">85% FREE</span>
                                        </div>
                                        <h3 className="text-sm font-bold text-slate-800 mb-1">API Usage</h3>
                                        <p className="text-[11px] font-medium text-slate-500 mb-5 leading-relaxed">Using 15 out of 100 maximum scraper request operations allowed.</p>
                                        <button className="w-full py-2.5 bg-slate-50 group-hover:bg-blue-50 group-hover:text-blue-700 group-hover:border-blue-200 text-slate-700 text-xs font-bold rounded-xl border border-slate-200 transition-colors">
                                            Upgrade Limit
                                        </button>
                                    </div>
                                </div>
                                </>
                              )}

                              {/* ─── History Tab ─── */}
                              {activeSidebarTab === 'History' && (
                                <div className="space-y-6">
                                    <div>
                                        <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight">Search History</h1>
                                        <p className="text-sm text-slate-500 mt-1 font-medium">Review your past LinkedIn query operations.</p>
                                    </div>
                                    <div className="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 overflow-hidden">
                                        {isHistoryLoading ? (
                                            <div className="p-12 text-center text-slate-400">
                                                <Ico name="autorenew" className="animate-spin text-3xl mb-2" />
                                                <p className="text-sm font-semibold">Loading history...</p>
                                            </div>
                                        ) : historyData.length === 0 ? (
                                            <div className="p-12 text-center text-slate-400">
                                                <Ico name="history_toggle_off" className="text-3xl mb-2" />
                                                <p className="text-sm font-semibold">No search history found.</p>
                                            </div>
                                        ) : (
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-50/80 border-b border-slate-100">
                                                            <th className="p-4 text-[11px] font-bold uppercase tracking-wider text-slate-500">Timestamp</th>
                                                            <th className="p-4 text-[11px] font-bold uppercase tracking-wider text-slate-500">Query</th>
                                                            <th className="p-4 text-[11px] font-bold uppercase tracking-wider text-slate-500">Details</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {historyData.map((item) => (
                                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 text-xs font-medium text-slate-500 whitespace-nowrap">
                                                                    {new Date(item.timestamp).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })}
                                                                </td>
                                                                <td className="p-4 text-sm font-bold text-slate-800">{item.search_query}</td>
                                                                <td className="p-4 text-xs text-slate-500 max-w-xs truncate" title={item.details || ''}>{item.details || '-'}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>
                                </div>
                              )}

                              {/* ─── Profile Settings Tab ─── */}
                              {activeSidebarTab === 'Profile' && (
                                <div className="space-y-6">
                                    <div>
                                        <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight">Profile Settings</h1>
                                        <p className="text-sm text-slate-500 mt-1 font-medium">Manage your display name and account security.</p>
                                    </div>

                                    {/* Account Info Card */}
                                    <div className="bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#FF9B51] to-orange-400"></div>
                                        <div className="flex items-center gap-5 pt-2">
                                            <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#FF9B51] to-orange-600 flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-orange-500/20 flex-shrink-0">
                                                {(profileData?.profile_name || _agedashEmail).charAt(0).toUpperCase()}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className="text-lg font-extrabold text-slate-900 truncate">{profileData?.profile_name || _agedashEmail}</p>
                                                <p className="text-sm text-slate-500">{_agedashEmail}</p>
                                                <div className="flex items-center gap-3 mt-2">
                                                    {profileData?.is_verified ? (
                                                        <span className="inline-flex items-center gap-1.5 bg-emerald-50 text-emerald-700 border border-emerald-200 text-[11px] font-bold px-3 py-1 rounded-full">
                                                            <Ico name="verified" className="text-sm" fill />
                                                            Verified
                                                        </span>
                                                    ) : (
                                                        <span className="inline-flex items-center gap-1.5 bg-amber-50 text-amber-700 border border-amber-200 text-[11px] font-bold px-3 py-1 rounded-full">
                                                            <Ico name="pending" className="text-sm" />
                                                            Pending Verification
                                                        </span>
                                                    )}
                                                    <span className="text-[11px] text-slate-400 font-medium">
                                                        {profileData?.role === 'owner' ? 'Owner' : 'User'} · Joined {profileData?.created_at ? new Date(profileData.created_at).toLocaleDateString('en-IN', { dateStyle: 'medium' }) : '—'}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Display Name Editor */}
                                    <div className="bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100">
                                        <div className="flex items-center gap-3 mb-5">
                                            <div className="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center text-[#FF9B51]"><Ico name="badge" className="text-lg" /></div>
                                            <h3 className="font-bold text-slate-800">Display Name</h3>
                                        </div>
                                        <p className="text-xs text-slate-500 mb-4">This name will be shown to admins and on your profile. Leave blank to use your email.</p>
                                        <div className="flex gap-3">
                                            <input
                                                type="text"
                                                value={profileName}
                                                onChange={e => setProfileName(e.target.value)}
                                                placeholder="Enter your display name"
                                                className="flex-1 px-4 py-3 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-2 focus:ring-[#FF9B51]/20 outline-none transition bg-slate-50"
                                            />
                                            <button
                                                onClick={saveProfileName}
                                                disabled={profileSaving}
                                                className="bg-gradient-to-r from-[#FF9B51] to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white font-bold px-6 py-3 rounded-xl transition-all duration-300 shadow-lg shadow-orange-500/25 hover:shadow-orange-500/40 disabled:opacity-50 flex items-center gap-2"
                                            >
                                                <Ico name={profileSaving ? 'autorenew' : 'save'} className={`text-lg ${profileSaving ? 'animate-spin' : ''}`} />
                                                {profileSaving ? 'Saving...' : 'Save'}
                                            </button>
                                        </div>
                                        {profileMsg && (
                                            <div className={`mt-3 px-4 py-2.5 rounded-xl text-xs font-semibold flex items-center gap-2 ${profileMsg.type === 'ok' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                                                <Ico name={profileMsg.type === 'ok' ? 'check_circle' : 'error'} className="text-sm" fill />
                                                {profileMsg.text}
                                            </div>
                                        )}
                                    </div>

                                    {/* Password Reset Form */}
                                    <div className="bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100">
                                        <div className="flex items-center gap-3 mb-5">
                                            <div className="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center text-[#FF9B51]"><Ico name="lock" className="text-lg" /></div>
                                            <h3 className="font-bold text-slate-800">Change Password</h3>
                                        </div>
                                        <p className="text-xs text-slate-500 mb-5">You must enter your current password before setting a new one. Minimum 4 characters.</p>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2">Current Password</label>
                                                <input
                                                    type="password"
                                                    value={curPwd}
                                                    onChange={e => setCurPwd(e.target.value)}
                                                    placeholder="Enter your current password"
                                                    className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-2 focus:ring-[#FF9B51]/20 outline-none transition bg-slate-50"
                                                />
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2">New Password</label>
                                                    <input
                                                        type="password"
                                                        value={newPwd}
                                                        onChange={e => setNewPwd(e.target.value)}
                                                        placeholder="Enter new password"
                                                        className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-2 focus:ring-[#FF9B51]/20 outline-none transition bg-slate-50"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-2">Confirm New Password</label>
                                                    <input
                                                        type="password"
                                                        value={confirmPwd}
                                                        onChange={e => setConfirmPwd(e.target.value)}
                                                        placeholder="Confirm new password"
                                                        className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:border-[#FF9B51] focus:ring-2 focus:ring-[#FF9B51]/20 outline-none transition bg-slate-50"
                                                    />
                                                </div>
                                            </div>
                                            <button
                                                onClick={changePassword}
                                                disabled={pwdSaving}
                                                className="bg-gradient-to-r from-[#FF9B51] to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white font-bold px-6 py-3 rounded-xl transition-all duration-300 shadow-lg shadow-orange-500/25 hover:shadow-orange-500/40 disabled:opacity-50 flex items-center gap-2"
                                            >
                                                <Ico name={pwdSaving ? 'autorenew' : 'lock_reset'} className={`text-lg ${pwdSaving ? 'animate-spin' : ''}`} />
                                                {pwdSaving ? 'Updating...' : 'Update Password'}
                                            </button>
                                            {pwdMsg && (
                                                <div className={`px-4 py-2.5 rounded-xl text-xs font-semibold flex items-center gap-2 ${pwdMsg.type === 'ok' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                                                    <Ico name={pwdMsg.type === 'ok' ? 'check_circle' : 'error'} className="text-sm" fill />
                                                    {pwdMsg.text}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                              )}

                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>

</html>
